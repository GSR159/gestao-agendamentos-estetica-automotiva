<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>🚗 Smart System</h2>

    <a href="dashboard.html">Dashboard</a>
    <a href="agendamentos.html">Agendamentos</a>
    <a href="clientes.html">Clientes</a>
    <a href="veiculos.html">Veículos</a>
    <a href="servicos.html">Serviços</a>

    <!-- 👤 USUÁRIO -->
    <div class="usuario-box">
      <span id="usuario-logado">👤</span>
      <button onclick="logout()">Sair</button>
    </div>
  </aside>

  <!-- CONTEÚDO -->
  <main class="content">

    <h1>Dashboard</h1>

    <!-- CARDS -->
    <div class="cards">
      <div class="card">
        <h3>Total</h3>
        <p id="total">0</p>
      </div>

      <div class="card">
        <h3>Pendentes</h3>
        <p id="pendentes">0</p>
      </div>

      <div class="card">
        <h3>Aprovados</h3>
        <p id="aprovados">0</p>
      </div>

      <div class="card">
        <h3>Recusados</h3>
        <p id="recusados">0</p>
      </div>
    </div>

    <!-- GRÁFICO -->
    <h2>Agendamentos por dia</h2>
    <div class="card">
      <canvas id="grafico"></canvas>
    </div>

    <!-- AGENDA DO DIA -->
    <h2>Agenda do Dia</h2>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Horário</th>
            <th>Cliente</th>
            <th>Veículo</th>
            <th>Serviço</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="agendaHoje"></tbody>
      </table>
    </div>

  </main>

</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="auth.js"></script>
<script src="dashboard.js"></script>

<script>
  verificarLogin();      // 🔥 corrigido 
  mostrarUsuario();      // 🔥 mostra usuário na sidebar
  ocultarParaCliente();  // 🔥 controle de acesso
</script>

</body>
</html>
