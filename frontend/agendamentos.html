<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Agendamentos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <aside class="sidebar">
    <h2>🚗 Smart System</h2>

    <a href="dashboard.html">Dashboard</a>
    <a href="agendamentos.html">Agendamentos</a>
    <a href="clientes.html">Clientes</a>
    <a href="veiculos.html">Veículos</a>
    <a href="servicos.html">Serviços</a>

    <div class="usuario-box">
      <span id="usuario-logado">👤</span>
      <button onclick="logout()">Sair</button>
    </div>
  </aside>

  <main class="content">

    <h1>Agendamentos</h1>

    <button onclick="abrirFormulario()" style="margin-bottom: 15px;">
      + Novo Agendamento
    </button>

    <!-- FORM -->
    <div id="formAgendamento" style="display:none; margin-bottom:20px;">

      <select id="cliente_id" onchange="carregarVeiculosDoCliente()"></select>

      <select id="veiculo_id"></select>

      <select id="servico_id"></select>

      <input type="datetime-local" id="data">

      <button onclick="criarAgendamento()">Salvar</button>
      <button onclick="fecharFormulario()">Cancelar</button>

    </div>

    <table>
      <thead>
        <tr>
          <th>Cliente</th>
          <th>Veículo</th>
          <th>Serviço</th>
          <th>Data</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tabela"></tbody>
    </table>

  </main>

</div>

<script src="auth.js"></script>
<script src="agendamentos.js"></script>

<script>
  verificarLogin();
  mostrarUsuario();
  ocultarParaCliente();
</script>

</body>
</html>
