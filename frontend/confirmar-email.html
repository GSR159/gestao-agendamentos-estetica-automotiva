<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmar Email - Smart System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --bg-deep: #020617;
      --bg-surface: #0f172a;
      --bg-card: #1e293b;
      --border: #334155;
      --primary: #3b82f6;
      --success: #22c55e;
      --danger: #ef4444;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-deep);
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .box {
      width: 100%;
      max-width: 460px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.45);
    }

    .icon-wrap {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(59, 130, 246, 0.12);
      color: #60a5fa;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.8rem;
      font-weight: 800;
    }

    p {
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--primary);
      color: white;
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 700;
      border: none;
      cursor: pointer;
    }

    .btn:hover {
      background: #2563eb;
    }

    .sucesso {
      color: var(--success);
    }

    .erro {
      color: var(--danger);
    }
  </style>
</head>
<body>

  <div class="box">
    <div class="icon-wrap">
      <i data-lucide="mail-check" class="w-9 h-9"></i>
    </div>

    <h1>Confirmando email</h1>
    <p id="mensagem">Aguarde um instante enquanto validamos seu link.</p>

    <a href="login.html" id="btn-login" class="btn" style="display: none;">
      <i data-lucide="log-in" class="w-4 h-4"></i>
      Ir para login
    </a>
  </div>

  <script>
    lucide.createIcons();

    const API = "http://localhost:3000";
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");

    const mensagem = document.getElementById("mensagem");
    const btnLogin = document.getElementById("btn-login");

    async function confirmarEmail() {
      if (!token) {
        mensagem.innerHTML = '<span class="erro">Token não encontrado na URL.</span>';
        return;
      }

      try {
        const res = await fetch(`${API}/auth/confirmar-email?token=${token}`);
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.erro || 'Erro ao confirmar email.');
        }

        mensagem.innerHTML = `<span class="sucesso">${data.mensagem}</span>`;
        btnLogin.style.display = "inline-flex";
      } catch (error) {
        mensagem.innerHTML = `<span class="erro">${error.message}</span>`;
      }
    }

    confirmarEmail();
  </script>

</body>
</html>
