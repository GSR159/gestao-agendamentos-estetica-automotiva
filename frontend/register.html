<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <title>Cadastro</title>

<body>

<div class="login-container">

    <p id="erro" class="erro"></p>

      Já tem conta?
      <a href="login.html">Entrar</a>

  </div>
</div>

<script src="register.js"></script>

</body>
</html>
