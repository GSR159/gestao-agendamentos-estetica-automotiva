<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Clientes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <aside class="sidebar">
    <h2>Smart System</h2>

    <a href="dashboard.html">Dashboard</a>
    <a href="agendamentos.html">Agendamentos</a>
    <a href="clientes.html">Clientes</a>
    <a href="veiculos.html">Veículos</a>
    <a href="servicos.html">Serviços</a>

    <div class="usuario-box">
      <span id="usuario-logado">Usuário</span>
      <button onclick="logout()">Sair</button>
    </div>
  </aside>

  <main class="content">
    <h1>Clientes</h1>

    <button onclick="abrirFormCliente()" style="margin-bottom: 15px;">
      + Novo Cliente
    </button>

    <div id="formCliente" style="display:none; margin-bottom:20px;">
      <input type="hidden" id="clienteId">

      <input id="nome" placeholder="Nome">
      <input id="email" placeholder="Email">
      <input id="telefone" placeholder="Telefone">

      <button onclick="salvarCliente()">Salvar</button>
      <button onclick="fecharFormCliente()">Cancelar</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Email</th>
          <th>Telefone</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tabela"></tbody>
    </table>

  </main>

</div>

<script src="auth.js"></script>
<script src="clientes.js"></script>

<script>
  verificarLogin();
  mostrarUsuario();
</script>

</body>
</html>
